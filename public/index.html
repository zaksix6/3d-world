<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Virtual World</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: Arial, sans-serif; overflow: hidden; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 0; left: 0; z-index: 100; pointer-events: none; }
        #loginPanel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); padding: 30px; border-radius: 10px;
            pointer-events: all; color: white; text-align: center; z-index: 1000; border: 2px solid #4CAF50;
        }
        #loginPanel input, #loginPanel select { padding: 10px; margin: 5px; border: none; border-radius: 5px; width: 200px; }
        #loginPanel button { padding: 10px 20px; margin: 10px; border: none; border-radius: 5px; background: #4CAF50; color: white; cursor: pointer; }
        #chatPanel {
            position: fixed; bottom: 20px; left: 20px; width: 300px; height: 60px;
            background: rgba(0,0,0,0.8); border-radius: 10px; padding: 10px;
            pointer-events: all; display: none; flex-direction: column; justify-content: flex-end;
            z-index: 100; border: 1px solid #333; transition: height 0.3s ease-in-out, width 0.3s ease-in-out;
        }
        #chatPanel.chat-collapsed { height: 60px; }
        #chatPanel.chat-minimal { height: 163px; width: 300px; }
        #chatPanel.chat-expanded { height: 282px; }
        #chatHeader { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #chatHeader h3 { margin: 0; }
        #chatToggle { padding: 5px 10px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; }
        #chatMessages { overflow-y: auto; color: white; font-size: 12px; border: 1px solid #333; padding: 5px; border-radius: 5px; margin-bottom: 10px; flex-grow: 1; display: none; }
        #chatMessages p { margin: 0; line-height: 1.4; }
        #chatPanel.chat-expanded #chatMessages, #chatPanel.chat-minimal #chatMessages { display: block; }
        #chatPanel.chat-minimal #chatMessages { height: 73px; flex-grow: 0; }
        #chatInputContainer {
            position: fixed; bottom: 20px; left: 20px; width: 300px;
            background: rgba(0,0,0,0.8); border-radius: 10px; padding: 10px;
            pointer-events: all; display: none; flex-direction: column; gap: 5px; z-index: 100;
        }
        #chatInput { width: 100%; padding: 5px; border: none; border-radius: 3px; box-sizing: border-box; }
        #sendButton { width: 100%; padding: 8px 10px; border: none; border-radius: 3px; background: #4CAF50; color: white; cursor: pointer; font-size: 14px; }
        #dpad {
            position: fixed; bottom: 20px; right: 20px; display: none; pointer-events: all; z-index: 100;
            grid-template-areas: ". up ." "left . right" ". down .";
            grid-template-columns: 60px 60px 60px; grid-template-rows: 60px 60px 60px; gap: 5px; opacity: 0.7;
        }
        .dpad-button {
            background-color: rgba(50,50,50,0.8); color: white; border: 2px solid rgba(100,100,100,0.8);
            border-radius: 10px; display: flex; justify-content: center; align-items: center;
            font-size: 1.5em; user-select: none; -webkit-user-select: none; touch-action: manipulation;
        }
        #dpad-up { grid-area: up; } #dpad-left { grid-area: left; } #dpad-right { grid-area: right; } #dpad-down { grid-area: down; }
        .dpad-button:active { background-color: rgba(100,100,100,0.9); border-color: rgba(150,150,150,0.9); }
        #playerList {
            position: fixed; top: 10px; left: 10px; color: white; font-size: 10px;
            background: rgba(0,0,0,0.7); padding: 5px; pointer-events: none; display: none; z-index: 100; border-radius: 5px;
        }
        #playerList h3 { margin: 0; font-size: 1em; }
        #playerList #playerNames { margin-top: 3px; }
        #billboardUploadPanel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); padding: 20px; border-radius: 10px;
            pointer-events: all; color: white; text-align: center; z-index: 1000; display: none; border: 2px solid #4CAF50;
        }
        #billboardUploadPanel h3 { margin-top: 0; }
        #billboardUploadPanel input[type="file"] { margin: 10px 0; }
        #billboardUploadPanel button { padding: 10px 20px; margin: 5px; border: none; border-radius: 5px; background: #4CAF50; color: white; cursor: pointer; }
        #loadingMessage {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); padding: 20px; border-radius: 10px;
            color: white; text-align: center; z-index: 1001; display: none; border: 2px solid #4CAF50;
        }
        #loadingMessage .spinner {
            width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid #4CAF50;
            border-radius: 50%; animation: spin 1s linear infinite; margin: 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 768px) and (orientation: portrait) {
            #chatPanel { width: 20vw; left: 5px; bottom: 120px; right: auto; padding: 5px; box-sizing: border-box; background-color: black; }
            #chatPanel.chat-expanded { height: 55vh; }
            #chatPanel.chat-minimal { width: 20vw; height: 30vh; left: 5px; right: auto; padding: 5px; }
            #chatPanel.chat-minimal #chatMessages { height: calc(30vh - 90px); }
            #chatInputContainer { width: 40vw; left: 5px; bottom: 10px; }
            #dpad { right: 5px; bottom: 5px; transform: scale(0.8); transform-origin: bottom right; }
        }
        @media (max-width: 768px) and (orientation: landscape) {
            #chatPanel { width: 20vw; left: 5px; bottom: 110px; right: auto; padding: 3px; }
            #chatPanel.chat-expanded { height: 65vh; }
            #chatPanel.chat-minimal { width: 20vw; height: 45vh; left: 5px; right: auto; }
            #chatPanel.chat-minimal #chatMessages { height: calc(45vh - 90px); }
            #chatInputContainer { width: 20vw; left: 5px; bottom: 10px; }
            #dpad { right: 5px; bottom: 5px; transform: scale(0.8); transform-origin: bottom right; }
        }
    </style>
</head>
<body>
    <div id="gameContainer"></div>
    <div id="ui">
        <div id="loginPanel">
            <h2>3D Chat World</h2>
            <input type="text" id="usernameInput" placeholder="Enter username">
            <select id="avatarSelect">
                <option value="selena2">Gomez</option>
                <option value="astronaut">Astro</option>
                <option value="martin2">Shorty</option>
                <option value="cub">King</option>
            </select>
            <button id="joinButton">Join World</button>
        </div>
        <div id="loadingMessage">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
        <div id="playerList" style="display: none;">
            <h3>Players Online (<span id="playerCount">0</span>)</h3>
            <div id="playerNames"></div>
        </div>
        <div id="billboardUploadPanel" style="display: none;">
            <h3 id="billboardTitle">Upload Image</h3>
            <input type="file" id="imageFile" accept="image/*">
            <button id="uploadButton">Upload</button>
            <button id="cancelUpload">Cancel</button>
        </div>
        <div id="chatPanel" class="chat-collapsed">
            <div id="chatHeader">
                <button id="chatToggle">Toggle Chat (Closed)</button>
            </div>
            <div id="chatMessages"></div>
        </div>
        <div id="chatInputContainer" style="display: none;">
            <input type="text" id="chatInput" placeholder="Type a message...">
            <button id="sendButton">Send</button>
        </div>
        <div id="dpad">
            <div class="dpad-button" id="dpad-up">&#9650;</div>
            <div class="dpad-button" id="dpad-left">&#9664;</div>
            <div class="dpad-button" id="dpad-right">&#9654;</div>
            <div class="dpad-button" id="dpad-down">&#9660;</div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, socket;
        let avatars = {};
        let myAvatar = null;
        let myUserId = null;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let velocity = new THREE.Vector3();
        let billboardMeshes = {};
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        let currentBillboardId = null;
        let isTyping = false;
        let selectedAvatar = 'selena2';
        let username = '';
        let gltfLoader = null;
        let avatarMixers = {};
        let clock = new THREE.Clock();
        let loadedGLBModels = {};
        let isTouchRotating = false;
        let touchX = 0;

        const avatarConfigs = {
            'selena2': { scale: 1.0, yOffset: 1.2, rotationOffset: Math.PI },
            'astronaut': { scale: 1.0, yOffset: 1.0, rotationOffset: Math.PI/2 },
            'martin2': { scale: 1.0, yOffset: 1.2, rotationOffset: Math.PI },
            'cub': { scale: 1.0, yOffset: 1, rotationOffset: Math.PI }
        };

        function initGLTFLoader() {
            if (typeof THREE.GLTFLoader !== 'undefined') {
                gltfLoader = new THREE.GLTFLoader();
            } else {
                gltfLoader = null;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const usernameInput = document.getElementById('usernameInput');
            const avatarSelect = document.getElementById('avatarSelect');
            const joinButton = document.getElementById('joinButton');
            avatarSelect.value = selectedAvatar;
            usernameInput.addEventListener('input', () => {
                joinButton.disabled = usernameInput.value.trim() === '';
            });
            joinButton.addEventListener('click', () => {
                username = usernameInput.value.trim();
                selectedAvatar = avatarSelect.value;
                if (username) {
                    document.getElementById('loginPanel').style.display = 'none';
                    document.getElementById('loadingMessage').style.display = 'block';
                    setTimeout(initializeWorld, 500);
                }
            });
            usernameInput.focus();
        });

        function initializeWorld() {
            initGLTFLoader();
            if (typeof io !== 'undefined') {
                socket = io();
                initScene();
                setupSocketHandlers();
            } else {
                alert('Socket.io not loaded. Please check your network connection.');
            }
        }

        function initScene() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x87CEEB, 50, 200);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 7, 10);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x87CEEB);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('gameContainer').appendChild(renderer.domElement);

            loadPermanentObject('objects/pond.glb', new THREE.Vector3(25, 10, -30), null, new THREE.Vector3(10, 10, 10));
            loadPermanentObject('objects/gazebo.glb', new THREE.Vector3(-25, -.7, 30), new THREE.Vector3(0, Math.PI / 4, 0), new THREE.Vector3(3.5, 3.5, 3.5));

            loadSkybox();
            createLighting();
            createGround();
            createTrees();
            createBillboards();
            createMyAvatar();
            setupControls();

            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            document.getElementById('playerList').style.display = 'block';
            document.getElementById('chatPanel').style.display = 'flex';
            if (window.innerWidth <= 768) {
                document.getElementById('dpad').style.display = 'grid';
            }
            animate();
        }

        function createLighting() {
            scene.add(new THREE.AmbientLight(0x404040, 1.8));
            const dl1 = new THREE.DirectionalLight(0xffffff, 0.8);
            dl1.position.set(50, 50, 50);
            dl1.castShadow = true;
            dl1.shadow.mapSize.width = 2048;
            dl1.shadow.mapSize.height = 2048;
            scene.add(dl1);
            const dl2 = new THREE.DirectionalLight(0xffffff, 0.8);
            dl2.position.set(50, 50, -50);
            scene.add(dl2);
        }

        function loadSkybox() {
            const loader = new THREE.CubeTextureLoader();
            loader.load([
                'textures/skybox/px.jpg', 'textures/skybox/nx.jpg',
                'textures/skybox/py.jpg', 'textures/skybox/ny.jpg',
                'textures/skybox/pz.jpg', 'textures/skybox/nz.jpg'
            ], texture => {
                scene.background = texture;
            }, undefined, error => {
                console.warn('Skybox could not be loaded:', error);
            });
        }

        function createGround() {
            const groundGeometry = new THREE.PlaneGeometry(100, 100);
            const textureLoader = new THREE.TextureLoader();
            textureLoader.load('textures/ground_texture.jpg', (texture) => {
                texture.wrapS = THREE.RepeatWrapping;
                texture.wrapT = THREE.RepeatWrapping;
                texture.repeat.set(10, 10);
                const ground = new THREE.Mesh(groundGeometry, new THREE.MeshLambertMaterial({ map: texture }));
                ground.rotation.x = -Math.PI / 2;
                ground.receiveShadow = true;
                scene.add(ground);
            }, undefined, () => {
                const ground = new THREE.Mesh(groundGeometry, new THREE.MeshLambertMaterial({ color: 0x3d8b37 }));
                ground.rotation.x = -Math.PI / 2;
                ground.receiveShadow = true;
                scene.add(ground);
            });
        }

        function createTrees() {
            for (let i = 0; i < 15; i++) {
                const tree = new THREE.Group();
                const treeType = Math.random() > 0.5 ? 'oak' : 'pine';
                if (treeType === 'oak') {
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 4), new THREE.MeshLambertMaterial({ color: 0x8B4513 }));
                    trunk.position.y = 2; trunk.castShadow = true; tree.add(trunk);
                    const leafColors = [0x228B22, 0x32CD32, 0x006400];
                    const leafColor = leafColors[Math.floor(Math.random() * leafColors.length)];
                    const lmat = new THREE.MeshLambertMaterial({ color: leafColor });
                    const l1 = new THREE.Mesh(new THREE.SphereGeometry(2.5), lmat); l1.position.y = 5.5; l1.castShadow = true; tree.add(l1);
                    const lmat2 = new THREE.MeshLambertMaterial({ color: leafColor });
                    const l2 = new THREE.Mesh(new THREE.SphereGeometry(1.8), lmat2); l2.position.set(-1.2, 4.8, 0.8); l2.castShadow = true; tree.add(l2);
                    const l3 = new THREE.Mesh(new THREE.SphereGeometry(1.8), lmat2); l3.position.set(1.5, 5.2, -0.5); l3.castShadow = true; tree.add(l3);
                } else {
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.4, 5), new THREE.MeshLambertMaterial({ color: 0x8B4513 }));
                    trunk.position.y = 2.5; trunk.castShadow = true; tree.add(trunk);
                    const pineColors = [0x228B22, 0x006400, 0x2F4F2F];
                    const pineColor = pineColors[Math.floor(Math.random() * pineColors.length)];
                    const pmat = new THREE.MeshLambertMaterial({ color: pineColor });
                    const c1 = new THREE.Mesh(new THREE.ConeGeometry(2.2, 3), pmat); c1.position.y = 5.5; c1.castShadow = true; tree.add(c1);
                    const c2 = new THREE.Mesh(new THREE.ConeGeometry(1.8, 2.5), pmat); c2.position.y = 6.8; c2.castShadow = true; tree.add(c2);
                    const c3 = new THREE.Mesh(new THREE.ConeGeometry(1.3, 2), pmat); c3.position.y = 8; c3.castShadow = true; tree.add(c3);
                }
                let x, z;
                do {
                    x = (Math.random() - 0.5) * 80;
                    z = (Math.random() - 0.5) * 80;
                } while (
                    (Math.abs(x) < 15 && Math.abs(z) < 15) ||
                    (Math.abs(x + 25) < 10 && Math.abs(z - 30) < 10) ||
                    (Math.abs(x - 25) < 10 && Math.abs(z + 30) < 10) ||
                    (Math.abs(x + 15) < 7 && Math.abs(z) < 7) ||
                    (Math.abs(x - 15) < 7 && Math.abs(z) < 7)
                );
                tree.position.set(x, 0, z);
                tree.rotation.y = Math.random() * Math.PI * 2;
                scene.add(tree);
            }
        }

        function createBillboards() {
            const addBoard = (id, x, z, rotY) => {
                const geo = new THREE.PlaneGeometry(8, 6);
                const mat = new THREE.MeshLambertMaterial({ color: 0xffffff, side: THREE.FrontSide });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(x, 5, z);
                mesh.rotation.y = rotY;
                mesh.castShadow = true;
                mesh.userData = { billboardId: id };
                billboardMeshes[id] = mesh;
                scene.add(mesh);
            };
            addBoard('1', -15, -0.1, 0);
            addBoard('2', -15, 0.1, Math.PI);
            addBoard('3', 15, -0.1, 0);
            addBoard('4', 15, 0.1, Math.PI);
        }

        function loadPermanentObject(objectPath, position, rotation, scale) {
            if (!gltfLoader) return;
            gltfLoader.load(objectPath, (gltf) => {
                const object = gltf.scene;
                object.position.copy(position);
                if (rotation) object.rotation.set(rotation.x, rotation.y, rotation.z);
                if (scale) object.scale.copy(scale);
                object.traverse((child) => {
                    if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; }
                });
                scene.add(object);
            }, undefined, (error) => {
                console.error('Failed to load object:', objectPath, error);
            });
        }

        function loadGLBAvatar(avatarType, callback) {
            if (!gltfLoader) { callback(null); return; }
            if (!avatarType || !avatarConfigs[avatarType]) { callback(null); return; }
            const config = avatarConfigs[avatarType];
            if (loadedGLBModels[avatarType]) {
                const cachedModel = loadedGLBModels[avatarType];
                const clonedAvatar = cachedModel.scene.clone();
                applyAvatarConfiguration(clonedAvatar, config);
                let mixer = null;
                if (cachedModel.animations && cachedModel.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(clonedAvatar);
                    const idleAnim = cachedModel.animations.find(a => a.name.toLowerCase().includes('idle') || a.name.toLowerCase().includes('stand'));
                    if (idleAnim) mixer.clipAction(idleAnim).play();
                }
                callback({ avatar: clonedAvatar, mixer, avatarType });
                return;
            }
            gltfLoader.load(`avatars/${avatarType}.glb`, (gltf) => {
                loadedGLBModels[avatarType] = gltf;
                const avatar = gltf.scene.clone();
                applyAvatarConfiguration(avatar, config);
                let mixer = null;
                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(avatar);
                    const idleAnim = gltf.animations.find(a => a.name.toLowerCase().includes('idle') || a.name.toLowerCase().includes('stand'));
                    if (idleAnim) mixer.clipAction(idleAnim).play();
                }
                callback({ avatar, mixer, avatarType });
            }, undefined, (error) => {
                console.warn(`Failed to load GLB avatar ${avatarType}:`, error);
                callback(null);
            });
        }

        function applyAvatarConfiguration(avatar, config) {
            const box = new THREE.Box3().setFromObject(avatar);
            const size = box.getSize(new THREE.Vector3());
            const maxSize = Math.max(size.x, size.y, size.z);
            const scale = (2.5 / maxSize) * config.scale;
            avatar.scale.set(scale, scale, scale);
            box.setFromObject(avatar);
            const center = box.getCenter(new THREE.Vector3());
            avatar.position.sub(center);
            avatar.position.y += config.yOffset;
            avatar.rotation.y = config.rotationOffset;
            avatar.traverse((child) => {
                if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; }
            });
        }

        function createMyAvatar() {
            loadGLBAvatar(selectedAvatar, (result) => {
                if (result && result.avatar) {
                    myAvatar = new THREE.Group();
                    myAvatar.add(result.avatar);
                    if (result.mixer) avatarMixers[myUserId] = result.mixer;
                    selectedAvatar = result.avatarType;
                    socket.emit('my-avatar-updated', { avatarType: selectedAvatar });
                } else {
                    console.error("Could not load my own avatar.");
                    return;
                }
                myAvatar.position.set(0, 0, 0);
                scene.add(myAvatar);
                updateCameraPosition();
            });
        }

        function createAvatar(userData) {
            return new Promise(resolve => {
                loadGLBAvatar(userData.avatarType, (result) => {
                    if (!result || !result.avatar) { resolve(null); return; }
                    const avatarGroup = new THREE.Group();
                    avatarGroup.userData.userId = userData.id;
                    avatarGroup.userData.username = userData.username;
                    avatarGroup.userData.avatarType = result.avatarType;
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.width = 256; canvas.height = 64;
                    context.fillStyle = 'rgba(0,0,0,0.8)';
                    context.fillRect(0, 0, 256, 64);
                    context.fillStyle = 'white';
                    context.font = '24px Arial';
                    context.textAlign = 'center';
                    context.fillText(userData.username, 128, 40);
                    const label = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
                    label.position.y = 3.5;
                    label.scale.set(2, 0.5, 1);
                    label.userData.isLabel = true;
                    avatarGroup.add(label);
                    result.avatar.userData.isAvatarMesh = true;
                    avatarGroup.add(result.avatar);
                    if (result.mixer) avatarMixers[userData.id] = result.mixer;
                    avatarGroup.position.set(userData.position.x, Math.max(0, userData.position.y), userData.position.z);
                    avatarGroup.rotation.copy(userData.rotation);
                    resolve(avatarGroup);
                });
            });
        }

        function isTouchOnBillboard(tx, ty) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((tx - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((ty - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            return raycaster.intersectObjects(Object.values(billboardMeshes)).length > 0;
        }

        function setupControls() {
            const chatInput = document.getElementById('chatInput');
            if (chatInput) {
                chatInput.addEventListener('focus', () => { isTyping = true; });
                chatInput.addEventListener('blur', () => { isTyping = false; });
            }
            document.addEventListener('keydown', (event) => {
                if (isTyping) return;
                switch (event.code) {
                    case 'KeyW': case 'ArrowUp': moveForward = true; break;
                    case 'KeyS': case 'ArrowDown': moveBackward = true; break;
                    case 'KeyA': case 'ArrowLeft': moveLeft = true; break;
                    case 'KeyD': case 'ArrowRight': moveRight = true; break;
                }
            });
            document.addEventListener('keyup', (event) => {
                if (isTyping) return;
                switch (event.code) {
                    case 'KeyW': case 'ArrowUp': moveForward = false; break;
                    case 'KeyS': case 'ArrowDown': moveBackward = false; break;
                    case 'KeyA': case 'ArrowLeft': moveLeft = false; break;
                    case 'KeyD': case 'ArrowRight': moveRight = false; break;
                }
            });
            let isMouseDown = false, mouseX = 0;
            document.addEventListener('mousedown', (event) => {
                if (event.target === renderer.domElement) { isMouseDown = true; mouseX = event.clientX; }
            });
            document.addEventListener('mouseup', (event) => {
                isMouseDown = false;
                if (event.target === renderer.domElement) handleBillboardClick(event);
            });
            document.addEventListener('mousemove', (event) => {
                if (isMouseDown && myAvatar) {
                    myAvatar.rotation.y -= (event.clientX - mouseX) * 0.005;
                    updateCameraPosition();
                    mouseX = event.clientX;
                }
            });
            document.addEventListener('touchstart', (event) => {
                if (event.target === renderer.domElement && event.touches.length === 1) {
                    const touch = event.touches[0];
                    if (!isTouchOnBillboard(touch.clientX, touch.clientY)) {
                        isTouchRotating = true;
                        touchX = touch.clientX;
                        event.preventDefault();
                    }
                }
            });
            document.addEventListener('touchmove', (event) => {
                if (isTouchRotating && myAvatar && event.touches.length === 1) {
                    const touch = event.touches[0];
                    myAvatar.rotation.y -= (touch.clientX - touchX) * 0.005;
                    updateCameraPosition();
                    touchX = touch.clientX;
                    event.preventDefault();
                }
            });
            document.addEventListener('touchend', (event) => {
                if (isTouchRotating) {
                    isTouchRotating = false;
                    if (event.changedTouches.length === 1) {
                        const touch = event.changedTouches[0];
                        if (isTouchOnBillboard(touch.clientX, touch.clientY)) handleBillboardTouch(touch);
                    }
                }
            });
            document.addEventListener('touchcancel', () => { isTouchRotating = false; });
            document.getElementById('uploadButton').addEventListener('click', handleModalUpload);
            document.getElementById('cancelUpload').addEventListener('click', closeUploadModal);
            const chatToggle = document.getElementById('chatToggle');
            if (chatToggle) chatToggle.addEventListener('click', toggleChatView);
            const sendButton = document.getElementById('sendButton');
            if (sendButton) sendButton.addEventListener('click', sendMessage);
            if (chatInput) chatInput.addEventListener('keypress', (event) => { if (event.key === 'Enter') sendMessage(); });
            const dpadUp = document.getElementById('dpad-up');
            const dpadDown = document.getElementById('dpad-down');
            const dpadLeft = document.getElementById('dpad-left');
            const dpadRight = document.getElementById('dpad-right');
            const handleTouchStart = (e, dir) => {
                e.preventDefault();
                if (dir === 'up') moveForward = true;
                if (dir === 'down') moveBackward = true;
                if (dir === 'left') moveLeft = true;
                if (dir === 'right') moveRight = true;
            };
            const handleTouchEnd = (e, dir) => {
                e.preventDefault();
                if (dir === 'up') moveForward = false;
                if (dir === 'down') moveBackward = false;
                if (dir === 'left') moveLeft = false;
                if (dir === 'right') moveRight = false;
            };
            if (dpadUp) { dpadUp.addEventListener('touchstart', e => handleTouchStart(e, 'up')); dpadUp.addEventListener('touchend', e => handleTouchEnd(e, 'up')); }
            if (dpadDown) { dpadDown.addEventListener('touchstart', e => handleTouchStart(e, 'down')); dpadDown.addEventListener('touchend', e => handleTouchEnd(e, 'down')); }
            if (dpadLeft) { dpadLeft.addEventListener('touchstart', e => handleTouchStart(e, 'left')); dpadLeft.addEventListener('touchend', e => handleTouchEnd(e, 'left')); }
            if (dpadRight) { dpadRight.addEventListener('touchstart', e => handleTouchStart(e, 'right')); dpadRight.addEventListener('touchend', e => handleTouchEnd(e, 'right')); }
        }

        function updateMovement() {
            if (!myAvatar) return;
            const speed = 0.2;
            const forwardVector = new THREE.Vector3(0, 0, 1).applyQuaternion(myAvatar.quaternion);
            const rightVector = new THREE.Vector3(-1, 0, 0).applyQuaternion(myAvatar.quaternion);
            let newVelocity = new THREE.Vector3();
            if (moveForward) newVelocity.add(forwardVector.clone().multiplyScalar(speed));
            if (moveBackward) newVelocity.add(forwardVector.clone().multiplyScalar(-speed));
            if (moveLeft) newVelocity.add(rightVector.clone().multiplyScalar(-speed));
            if (moveRight) newVelocity.add(rightVector.clone().multiplyScalar(speed));
            myAvatar.position.add(newVelocity);
            myAvatar.position.y = Math.max(0, myAvatar.position.y);
            updateCameraPosition();
            if (newVelocity.length() > 0 && socket && socket.connected) {
                socket.emit('user-moved', {
                    position: { x: myAvatar.position.x, y: myAvatar.position.y, z: myAvatar.position.z },
                    rotation: { x: myAvatar.rotation.x, y: myAvatar.rotation.y, z: myAvatar.rotation.z }
                });
            }
        }

        function updateCameraPosition() {
            if (!myAvatar) return;
            const pos = myAvatar.position.clone();
            const rot = myAvatar.rotation.y;
            camera.position.set(pos.x - Math.sin(rot) * 5, pos.y + 2, pos.z - Math.cos(rot) * 5);
            camera.lookAt(new THREE.Vector3(pos.x, pos.y + 1.5, pos.z));
        }

        function animate() {
            requestAnimationFrame(animate);
            const deltaTime = clock.getDelta();
            Object.values(avatarMixers).forEach(mixer => { if (mixer) mixer.update(deltaTime); });
            updateMovement();
            renderer.render(scene, camera);
        }

        function toggleChatView() {
            const chatPanel = document.getElementById('chatPanel');
            const chatToggle = document.getElementById('chatToggle');
            const chatInputContainer = document.getElementById('chatInputContainer');
            if (!chatPanel || !chatToggle || !chatInputContainer) return;
            if (chatPanel.classList.contains('chat-expanded')) {
                chatPanel.classList.replace('chat-expanded', 'chat-minimal');
                chatToggle.textContent = 'Toggle Chat (Min)';
            } else if (chatPanel.classList.contains('chat-minimal')) {
                chatPanel.classList.replace('chat-minimal', 'chat-collapsed');
                chatToggle.textContent = 'Toggle Chat (Closed)';
            } else {
                chatPanel.classList.replace('chat-collapsed', 'chat-expanded');
                chatToggle.textContent = 'Toggle Chat (Full)';
            }
            chatInputContainer.style.display = chatPanel.classList.contains('chat-collapsed') ? 'none' : 'flex';
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (message && socket && socket.connected) {
                socket.emit('chat-message', { message });
                input.value = '';
            }
        }

        function addChatMessage(messageData) {
            const messagesDiv = document.getElementById('chatMessages');
            const p = document.createElement('p');
            const time = new Date(messageData.timestamp).toLocaleTimeString();
            if (messageData.type === 'system') {
                p.style.color = '#ffeb3b'; p.style.fontStyle = 'italic';
                p.textContent = `[${time}] ${messageData.message}`;
            } else {
                p.style.color = '#ffffff';
                p.innerHTML = `<strong>[${time}] ${messageData.username}:</strong> ${messageData.message}`;
            }
            messagesDiv.appendChild(p);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function updateBillboard(billboardId, imageData) {
            const texture = new THREE.TextureLoader().load(imageData);
            const pairs = { '1': '2', '2': '1', '3': '4', '4': '3' };
            const pairId = pairs[billboardId];
            if (billboardMeshes[billboardId]) {
                billboardMeshes[billboardId].material.map = texture;
                billboardMeshes[billboardId].material.needsUpdate = true;
            }
            if (pairId && billboardMeshes[pairId]) {
                billboardMeshes[pairId].material.map = texture;
                billboardMeshes[pairId].material.needsUpdate = true;
            }
        }

        function handleBillboardClick(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(Object.values(billboardMeshes));
            if (intersects.length > 0 && intersects[0].object.userData.billboardId) {
                openUploadModal(intersects[0].object.userData.billboardId);
            }
        }

        function handleBillboardTouch(touch) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((touch.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((touch.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(Object.values(billboardMeshes));
            if (intersects.length > 0 && intersects[0].object.userData.billboardId) {
                openUploadModal(intersects[0].object.userData.billboardId);
            }
        }

        function openUploadModal(billboardId) {
            currentBillboardId = billboardId;
            const pairName = (billboardId === '1' || billboardId === '2') ? 'Billboard 1' : 'Billboard 2';
            document.getElementById('billboardTitle').textContent = `Upload Image to ${pairName}`;
            document.getElementById('billboardUploadPanel').style.display = 'block';
            document.getElementById('imageFile').value = '';
        }

        function closeUploadModal() {
            document.getElementById('billboardUploadPanel').style.display = 'none';
            currentBillboardId = null;
        }

        function handleModalUpload() {
            if (!currentBillboardId) return;
            const file = document.getElementById('imageFile').files[0];
            if (!file) { alert('Please select a file first.'); return; }
            if (file.size > 2 * 1024 * 1024) { alert('File size must be less than 2MB.'); return; }
            const formData = new FormData();
            formData.append('image', file);
            formData.append('billboardId', currentBillboardId);
            const button = document.getElementById('uploadButton');
            button.disabled = true; button.textContent = 'Uploading...';
            fetch('/upload-billboard', { method: 'POST', body: formData })
                .then(r => r.json())
                .then(data => { if (data.success) closeUploadModal(); else alert(data.error || 'Upload failed'); })
                .catch(error => alert('Upload failed: ' + error.message))
                .finally(() => { button.disabled = false; button.textContent = 'Upload'; });
        }

        function setupSocketHandlers() {
            if (!socket) return;
            socket.on('connect', () => {
                myUserId = socket.id;
                socket.emit('user-joined', {
                    username, avatarType: selectedAvatar,
                    position: { x: 0, y: 0, z: 0 }, rotation: { x: 0, y: 0, z: 0 }
                });
            });
            socket.on('disconnect', () => console.log('Disconnected'));
            socket.on('connect_error', () => alert('Failed to connect to server'));
            socket.on('init-data', (data) => {
                data.chatMessages.forEach(m => addChatMessage(m));
                ['1','2','3','4'].forEach(id => { if (data.billboardImages[id]) updateBillboard(id, data.billboardImages[id]); });
            });
            socket.on('user-list-updated', async (users) => {
                const currentUsers = new Set(Object.values(users).map(u => u.id));
                Object.keys(avatars).forEach(userId => {
                    if (!currentUsers.has(userId)) {
                        scene.remove(avatars[userId]);
                        if (avatarMixers[userId]) delete avatarMixers[userId];
                        delete avatars[userId];
                    }
                });
                for (const userData of Object.values(users)) {
                    if (userData.id === myUserId) continue;
                    const existing = avatars[userData.id];
                    if (existing) {
                        if (existing.userData.avatarType !== userData.avatarType) {
                            scene.remove(existing);
                            if (avatarMixers[userData.id]) delete avatarMixers[userData.id];
                            delete avatars[userData.id];
                            const newAvatar = await createAvatar(userData);
                            if (newAvatar) { avatars[userData.id] = newAvatar; scene.add(newAvatar); }
                        } else {
                            existing.position.set(userData.position.x, Math.max(0, userData.position.y), userData.position.z);
                            existing.rotation.copy(userData.rotation);
                        }
                    } else {
                        const newAvatar = await createAvatar(userData);
                        if (newAvatar) { avatars[userData.id] = newAvatar; scene.add(newAvatar); }
                    }
                }
                document.getElementById('playerCount').textContent = Object.keys(users).length;
            });
            socket.on('user-left', (userId) => {
                if (avatars[userId]) {
                    scene.remove(avatars[userId]);
                    if (avatarMixers[userId]) delete avatarMixers[userId];
                    delete avatars[userId];
                }
            });
            socket.on('user-moved', (data) => {
                if (avatars[data.userId]) {
                    avatars[data.userId].position.copy(data.position);
                    avatars[data.userId].rotation.copy(data.rotation);
                }
            });
            socket.on('chat-message', addChatMessage);
            socket.on('billboard-updated', (data) => updateBillboard(data.billboardId, data.imageData));
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
