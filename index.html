<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>My Free 3D Multi-User World</title>
    
    <!-- Stable, fully compatible Web3D version stack -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
    <script src="https://unpkg.com"></script>
  </head>
  <body>

    <!-- A-Frame 3D Engine Scene Wrapper -->
    <a-scene networked-scene="
      room: lobby;
      debug: true;
      adapter: wseasyrtc;
      serverURL: https://signaling-server-b0ds.onrender.com;
    ">
      
      <!-- Define Assets and Templates for Avatars -->
      <a-assets>
        <template id="avatar-template">
          
            <a-sphere class="head" color="#5F9EA0" radius="0.4">
              <a-sphere class="eye" color="#FFF" radius="0.1" position="0.15 0.1 -0.35"></a-sphere>
              <a-sphere class="eye" color="#FFF" radius="0.1" position="-0.15 0.1 -0.35"></a-sphere>
            </a-sphere>
          
        </template>
      </a-assets>

      <!-- The Environment / World Objects -->
      <a-sky color="#ECEFF1"></a-sky>
      <a-plane position="0 0 0" rotation="-90 0 0" width="30" height="30" color="#7BC8A4"></a-plane>
      <a-box position="0 1 -5" rotation="0 45 0" color="#4CC3D9"></a-box>

      <!-- User's Camera with Keyboard Movement Controls -->
      
      

    </a-scene>

  </body>
</html>
